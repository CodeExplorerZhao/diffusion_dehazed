data:
    dataset: "Sate"
    image_size: 64
    channels: 3
    num_workers: 32
    data_dir: "../../datasets/Haze1k_ddm"
    conditional: True
    valpath: "results/images/all_val"
    ckpts: "ckpts/all"

model:
    in_channels: 3
    out_ch: 3
    ch: 128
    ch_mult: [1, 1, 2, 2, 4, 4]
    num_res_blocks: 2
    attn_resolutions: [16, ]
    dropout: 0.0
    ema_rate: 0.999
    ema: True
    resamp_with_conv: True
    use_freq: True
    use_phys: True
    use_freq_out: True

diffusion:
    beta_schedule: linear
    beta_start: 0.0001
    beta_end: 0.02
    num_diffusion_timesteps: 1000

training:
    patch_n: 8
    batch_size: 10
    n_epochs: 20000
    n_iters: 2000000
    snapshot_freq: 10000
    validation_freq: 2000

sampling:
    batch_size: 8
    last_only: True

optim:
    weight_decay: 0.000
    optimizer: "Adam"
    lr: 0.00002
    amsgrad: False
    eps: 0.00000001
